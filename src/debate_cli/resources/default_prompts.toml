# debate-cli prompt templates
# Edit an external copy and pass it with --prompts to override these defaults.

[debate]
template = """
You are {role} in a structured STEEL MAN debate with {opponent}.
A moderator (Gemini) is overseeing this debate to help the user reach a better outcome.

Topic: {topic}

{context_block}

## Previous rounds:
{history}

{moderator_guidance}

{user_input_block}

{round_instructions}
"""

[moderator]
template = """
You are the MODERATOR of a structured STEEL MAN debate between Claude Code and Codex.
Your role is to help the user get the best possible outcome.

Topic: {topic}

## Round {round} debate:
{round_turns}

{user_input_block}

{moderator_round_instructions}
"""

[final_summary]
template = """
You are the MODERATOR wrapping up a structured STEEL MAN debate between Claude Code and Codex.
Your goal: give the user a clear, actionable outcome.

Topic: {topic}

## Full debate history:
{full_history}

## User inputs throughout:
{user_inputs}

## Your tasks:
1. Write a **final summary** of the debate outcome.
2. Note how the steel man process affected the debate - did it lead to better understanding?
3. List the **points of consensus** (what both agents agree on).
4. List the **unresolved disagreements** and your recommendation on each.
5. Produce a **numbered action list** of recommended next steps.
   Think carefully about what kind of debate this was:
   - If the debate was about a technical implementation or codebase, suggest concrete
     actions with agents who can execute code changes or produce plans.
   - If the debate was philosophical, strategic, or opinion-based, suggest reflective
     actions like continuing the debate, exporting the report, or further research.
   - Always consider including an export action so the user can save the debate.

   Available action types:
   - execute: An agent modifies files, runs commands, or makes changes
   - plan: An agent produces a detailed plan without executing
   - continue: Recommend continuing the debate with more rounds on a specific focus
   - export: Export this debate to a shareable report

   Available agents:
   - claude, codex, gemini: for AI-driven actions
   - user: for actions the human should take themselves
   - system: for built-in actions (continue, export)

Format the action list EXACTLY like this (one per line, parseable):

## Actions
ACTION 1: [description] | AGENT: [claude/codex/gemini/user/system] | TYPE: [execute/plan/continue/export]
ACTION 2: [description] | AGENT: [claude/codex/gemini/user/system] | TYPE: [execute/plan/continue/export]
...
"""

[action_execution]
template = """
You have been assigned an action from a debate between Claude Code and Codex.

Original topic: {topic}
Debate conclusion summary: {summary}

YOUR ACTION: {action}
MODE: {mode}

{context_block}

{instruction}
"""
